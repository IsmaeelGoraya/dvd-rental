<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DVD Search</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Search Movies</h1>
    <form id="searchForm">
        <label>Title: <input type="text" name="title"></label><br>
        <label>Max Rental Rate: <input type="number" step="0.01" name="rentalRate"></label><br>

        <label>Rating:
        <select name="rating">
            <option value="">Any</option>
            <option value="G">G</option>
            <option value="PG">PG</option>
            <option value="PG-13">PG-13</option>
            <option value="R">R</option>
            <option value="NC-17">NC-17</option>
        </select>
        </label><br>

        <label>Release Year: <input type="number" name="year"></label><br>
        <button type="submit">Search</button>
    </form>
    <div id="results"></div>

    <hr>

    <h1>Search Customers</h1>
    <form id="customerSearchForm">
        <label>First Name: 
            <input type="text" name="firstName">
        </label><br>

        <label>Last Name: 
            <input type="text" name="lastName">
        </label><br>

        <label>Email: 
            <input type="text" name="email">
        </label><br>

        <button type="submit">Search Customers</button>
    </form>

    <div id="customerResults"></div>

    <script>
        document.getElementById('searchForm').onsubmit = async function(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const params = new URLSearchParams(formData).toString();
            // const response = await fetch(`/films/search?${params}`);
            const response = await fetch(`http://localhost:3000/films/search?${params}`);
            const films = await response.json();
            const resultsDiv = document.getElementById('results');
            // resultsDiv.innerHTML = films.map(film => 
            //     `<div>
            //         <strong>${film.title}</strong> 
            //         - $${film.rental_rate} 
            //         - ${film.release_year} 
            //         - Rating: ${film.rating}
            //     </div>`
            // ).join('');
            if (films.length === 0) {
            resultsDiv.innerHTML = "<p>No results found.</p>";
            return;
            }

            let table = `
            <table class="movie-table">
                <thead>
                <tr>
                    <th>Title</th>
                    <th>Rental Rate ($)</th>
                    <th>Release Year</th>
                    <th>Rating</th>
                </tr>
                </thead>
                <tbody>
            `;

            films.forEach(film => {
            table += `
                <tr>
                <td>${film.title}</td>
                <td>${film.rental_rate}</td>
                <td>${film.release_year}</td>
                <td>${film.rating}</td>
                </tr>
            `;
            });

            table += `
                </tbody>
            </table>
            `;

            resultsDiv.innerHTML = table;
        };
    </script>
</body>
</html>
